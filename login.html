<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle de RMT</title>
  <link rel="stylesheet" href="css/login.css" />
  <script defer src="js/login.js"></script>
</head>
<body>
  <div class="login-container">
    <header class="login-header">
      <h1>CSupAb - Gerência de Suprimentos</h1>
      <p class="tagline">Controle de RMT</p>
    </header>

    <div class="login-card">
      <h2>Entrar no Sistema</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="roleSelect">Perfil</label>
          <select id="roleSelect" required>
            <option value="">Selecione seu perfil</option>
            <option value="CSupAb">Administrador (CSupAb)</option>
            <option value="DepSIMRj">DepSIMRj</option>
            <option value="CDAM">CDAM</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p id="error" class="error"></p>
      </form>
    </div>

    <footer class="login-footer">
      <p>© 2025 Supply Control — Todos os direitos reservados.</p>
    </footer>
  </div>
</body>
</html>
